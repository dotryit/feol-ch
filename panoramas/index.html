    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Gallery</title>
    <style>
        /* Gallery Styling */
        .gallery {
            display: grid;
            gap: 10px;
            padding: 20px;
        }

        .pan-thumb {
            height: 300px;
            cursor: pointer;
            border-radius: 8px;
        }

        /* Overlay Background */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            overflow: hidden;
        }

        /* The Container & Animation */
        .pan-container {
            height: 100%;
            white-space: nowrap;
        }

        #activePan {
            height: 100%;
            width: auto;
            will-change: transform;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        html {
            scrollbar-width: none;
        }
    </style>

    <div id="fullScreenViewer" class="overlay">
        <div class="pan-container">
            <img id="activePan" src="" alt="Panorama" onclick="onClickImage(event)">
            <span class="close-btn" onclick="closeFull()">&times;</span>
        </div>
    </div>

    <script>
        const activePan = document.getElementById('activePan');
        const panLeftBtn = document.getElementById('panLeft');
        const panRightBtn = document.getElementById('panRight');
        const fullScreenViewer = document.getElementById('fullScreenViewer');
        let animation = null;
        let paused = false;
        let duration = 0;
        let imageDirection = 1; // 1 for right, -1 for left
        let animationDirection = 1; // 1 for forward, -1 for reverse

        async function openFull(preview) {
            var fullName = preview.replace('preview', 'full');
            activePan.src = fullName;
            activePan.onload = () => {
                imageWidth = activePan.naturalWidth; // Actual width of the image
                imageHeight = activePan.naturalHeight; // Actual height of the image
                panWidth = activePan.width; // Displayed width of the image
                panHeight = activePan.height; // Displayed height of the image
                viewerWidth = window.innerWidth; // Width of the viewport
                duration = (panWidth - viewerWidth) * 40 / 10; // The duration in ms is calculated based on the width of the panorama image, with a base factor of 40 seconds for every 10,000 pixels in width.
                imageDirection = 1; // Start by panning to the right
                animationDirection = 1; // Start with forward animation
                currentAnimationTime = duration * 1000 + duration / 2; // Start in the middle of the animation
                animation = activePan.animate(
                    [
                        { transform: 'translateX(0%)' },
                        { transform: 'translateX(calc(-100% + 100vw))' }
                    ], {
                    duration: duration, // Use the pre-calculated duration
                    easing: 'linear',
                    iterations: Infinity,
                    direction: 'alternate',
                    fill: 'forwards',
                    currentTime: currentAnimationTime
                }
                );
                animation.pause(); // Start paused, will be unpaused when the user clicks the image
                animation.currentTime = currentAnimationTime; // Set the initial position to the middle of the animation
                animation.play(); // Start the animation
                console.log(`Loaded panorama ${fullName}, animation duration: ${duration.toFixed(2)}ms, image width: ${imageWidth}px, image height: ${imageHeight}px, pan width: ${panWidth}px, pan height: ${panHeight}px, viewer width: ${viewerWidth}px`);
            };
            fullScreenViewer.style.display = 'block';
        }

        function closeFull() {
            fullScreenViewer.style.display = 'none';
        }

        function clickRight() {
            if (paused) {
                if (imageDirection == -1) {
                    animation.reverse();
                    animationDirection = -animationDirection; // Flip the animation direction
                }
                toggleAnimation(); // Unpause if currently paused
            } else {
                imageDirection = getImageDirection();
                if (imageDirection == -1) {
                    animation.reverse();
                    animationDirection = -animationDirection; // Flip the animation direction
                } else {
                    animation.currentTime = animation.currentTime + (1000 * animationDirection); // Move right by 5 seconds
                }
            }
            unpause(); // Ensure the animation is playing after manual control
            logAnimationState();
        }

        function clickLeft() {
            if (paused) {
                if (imageDirection == 1) {
                    animation.reverse();
                    animationDirection = -animationDirection; // Flip the animation direction
                }
                toggleAnimation(); // Unpause if currently paused
            } else {
                imageDirection = getImageDirection();
                if (imageDirection == 1) {
                    animation.reverse();
                    animationDirection = -animationDirection; // Flip the animation direction
                } else {
                    animation.currentTime = animation.currentTime + (1000 * animationDirection); // Move left by 5 seconds
                }
                unpause(); // Ensure the animation is playing after manual control
                logAnimationState();
            }
        }

        function onClickImage(event) {
            const clickX = event.clientX;
            const thirdWidth = event.view.viewerWidth / 3;

            if (clickX < thirdWidth) {
                clickLeft();
            } else if (clickX > thirdWidth * 2) {
                clickRight();
            } else {
                toggleAnimation();
            }
        }

        function toggleAnimation() {
            paused ? animation.play() : animation.pause();
            paused = !paused;
            logAnimationState();
        }

        function unpause() {
            animation.play();
            paused = false;
        }

        function getImageDirection() {
            return (Math.trunc(animation.currentTime / duration) % 2 < 0.5 ? 1 : -1) * animationDirection;
        }

        function logAnimationState() {
            console.log(`Animation time: ${animation.currentTime}ms, animation direction: ${animationDirection}, image direction: ${getImageDirection() == 1 ? 'right' : 'left'}, Paused: ${paused}`);
        }
    </script>
